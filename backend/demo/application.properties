# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:demo_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

# Disable Spring Session JDBC (not needed for basic auth)
spring.session.store-type=none
spring.session.jdbc.initialize-schema=never

# External Service Configuration
# Set the URL of the external prompt processing service (e.g., http://localhost:8081/api/prompt)
external.service.url=

# Actuator Health Check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
